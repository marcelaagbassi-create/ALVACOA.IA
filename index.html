<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALVACOA - IA Multi-modèles</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 70%); height:100vh; display:flex; justify-content:center; align-items:center; }
        .chat-container { width:100%; max-width:750px; height:92vh; background:#111827; border-radius:20px; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(99,102,241,0.15); overflow:hidden; border:1px solid rgba(99,102,241,0.2); }
        .chat-header { background:#0d1321; padding:18px 24px; display:flex; align-items:center; gap:14px; border-bottom:1px solid rgba(99,102,241,0.3); flex-wrap:wrap; }
        .avatar { width:48px; height:48px; background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:bold; color:white; }
        .header-info h2 { color:#f1f5f9; font-size:18px; }
        .header-info p { color:#22c55e; font-size:12px; display:flex; align-items:center; gap:6px; }
        .status-dot { width:8px; height:8px; background:#22c55e; border-radius:50%; animation:pulse 2s infinite; display:inline-block; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .header-actions { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }
        .model-select { background:#374151; color:white; border:1px solid #4b5563; border-radius:8px; padding:8px 12px; font-size:12px; cursor:pointer; }
        .api-btn, .train-btn { color:white; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; }
        .api-btn { background:#374151; }
        .api-btn.active { background:#059669; animation:glow 2s infinite; }
        @keyframes glow { 0%,100%{box-shadow:0 0 5px #22c55e} 50%{box-shadow:0 0 20px #22c55e} }
        .train-btn { background:#6366f1; }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:18px; background:#111827; }
        .chat-messages::-webkit-scrollbar { width:5px; }
        .chat-messages::-webkit-scrollbar-thumb { background:#374151; border-radius:10px; }
        .message { display:flex; gap:12px; animation:slideIn 0.35s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
        .message.user { justify-content:flex-end; }
        .message-avatar { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
        .message.assistant .message-avatar { background:linear-gradient(135deg,#6366f1,#a855f7); }
        .message.user .message-avatar { background:#374151; order:2; }
        .message-bubble { max-width:72%; padding:14px 18px; border-radius:18px; line-height:1.6; font-size:14.5px; word-wrap:break-word; }
        .message.assistant .message-bubble { background:#1e293b; color:#e2e8f0; border-bottom-left-radius:6px; }
        .message.user .message-bubble { background:linear-gradient(135deg,#6366f1,#7c3aed); color:white; border-bottom-right-radius:6px; }
        .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:700; margin-left:8px; }
        .badge.gemini { background:#4285f4; color:white; }
        .badge.deepseek { background:#4f46e5; color:white; }
        .badge.anthropic { background:#d97706; color:white; }
        .badge.local { background:#6366f1; color:white; }
        .result-block { background:rgba(0,0,0,0.3); border-left:3px solid #6366f1; padding:12px 16px; border-radius:8px; margin:10px 0; font-family:'Courier New',monospace; }
        .chat-input-area { padding:16px 24px; border-top:1px solid rgba(99,102,241,0.2); background:#0d1321; display:flex; gap:12px; }
        .chat-input { flex:1; background:#1e293b; border:1px solid #374151; border-radius:14px; padding:14px 18px; color:#e2e8f0; font-size:14.5px; outline:none; }
        .chat-input:focus { border-color:#6366f1; }
        .send-btn { background:linear-gradient(135deg,#6366f1,#7c3aed); border:none; border-radius:14px; padding:14px 22px; color:white; cursor:pointer; font-size:18px; }
        .typing-indicator { display:flex; gap:5px; padding:10px 0; }
        .typing-indicator span { width:8px; height:8px; background:#6366f1; border-radius:50%; animation:typing 1.4s infinite; }
        .typing-indicator span:nth-child(2){animation-delay:0.2s}
        .typing-indicator span:nth-child(3){animation-delay:0.4s}
        @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.3} 30%{transform:translateY(-10px);opacity:1} }
        .modal { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; }
        .modal.active { display:flex; }
        .modal-content { background:#1e293b; padding:30px; border-radius:16px; width:90%; max-width:500px; color:#e2e8f0; }
        .modal-content h3 { margin-bottom:16px; }
        .modal-content input,.modal-content textarea { width:100%; background:#0f172a; border:1px solid #374151; border-radius:8px; padding:12px; color:#e2e8f0; margin-bottom:12px; }
        .modal-content textarea { height:120px; resize:vertical; }
        .modal-content button { background:#6366f1; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-right:10px; }
        .modal-content button.close-btn { background:#374151; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">A</div>
            <div class="header-info">
                <h2>ALVACOA</h2>
                <p><span class="status-dot"></span> <span id="modeDisplay">Mode Local</span></p>
            </div>
            <div class="header-actions">
                <select class="model-select" id="modelSelect" onchange="changeModel()">
                    <option value="gemini">🧠 Gemini</option>
                    <option value="deepseek">🐋 DeepSeek</option>
                    <option value="anthropic">🧬 Claude</option>
                </select>
                <button class="api-btn" id="apiToggleBtn" onclick="toggleAPIMode()">🔌 API: OFF</button>
                <button class="train-btn" onclick="openTrainModal()">🧠 Apprendre</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" 
                   placeholder="Écrivez votre message..." onkeydown="handleKeyDown(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Modal Apprentissage -->
    <div class="modal" id="trainModal">
        <div class="modal-content">
            <h3>🧠 Apprendre à ALVACOA</h3>
            <input type="text" id="trainQuestion" placeholder="Mot-clé ou question">
            <textarea id="trainAnswer" placeholder="Réponse..."></textarea>
            <button onclick="trainAI()">✅ Enregistrer</button>
            <button class="close-btn" onclick="closeTrainModal()">❌ Fermer</button>
        </div>
    </div>

    <script>
                // ============ CONFIGURATION ============
        const API_URL = 'https://alvacoa-api.onrender.com/chat';
        let useAPI = false;
        let selectedModel = 'gemini';

        // ============ CONNAISSANCES ============
        let knowledgeBase = JSON.parse(localStorage.getItem('alvacoa_knowledge')) || {
            "bonjour": "Bonjour ! 👋 Je suis ALVACOA. Mode local ou API ?",
            "salut": "Salut ! 😊",
            "qui es-tu": "Je suis <strong>ALVACOA</strong>, IA multi-modèles ! 🧠🐋🧬",
            "merci": "Avec plaisir ! 🙌",
            "aide": "📚 <strong>Aide :</strong><br>🧠 Gemini (gratuit)<br>🐋 DeepSeek (gratuit)<br>🧬 Claude (payant)<br>🧮 Calculs : 15+8*3"
        };

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        function saveKnowledge() {
            localStorage.setItem('alvacoa_knowledge', JSON.stringify(knowledgeBase));
        }

        function addMessage(type, content, source = 'local') {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const badge = type === 'assistant' ? 
                `<span class="badge ${source}">${source.toUpperCase()}</span>` : '';
            div.innerHTML = `
                <div class="message-avatar">${type === 'user' ? '👤' : 'A'}</div>
                <div class="message-bubble">${content}${badge}</div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">A</div>
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ============ CALCULS ============
        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            let r = 1;
            for (let i = 2; i <= n; i++) r *= i;
            return r;
        }

        function evaluateMath(expr) {
            try {
                let e = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/π/gi,Math.PI).replace(/\^/g,'**')
                    .replace(/sin\(/gi,'Math.sin(').replace(/cos\(/gi,'Math.cos(').replace(/tan\(/gi,'Math.tan(')
                    .replace(/log\(/gi,'Math.log10(').replace(/ln\(/gi,'Math.log(').replace(/sqrt\(/gi,'Math.sqrt(')
                    .replace(/(\d+)!/g,(_,n)=>factorial(parseInt(n))).replace(/(\d+)%/g,'($1/100)');
                let r = Function('"use strict"; return (' + e + ')')();
                if (isNaN(r) || !isFinite(r)) return null;
                return Number.isInteger(r) ? r : parseFloat(r.toFixed(10));
            } catch(e) { return null; }
        }

        function getLocalResponse(msg) {
            const m = msg.toLowerCase();
            if (/[\d]+\s*[\+\-\*\/\^]/.test(m) || /sin|cos|tan|log|sqrt/i.test(m)) {
                const expr = m.replace(/calcule|calculer|résous|combien fait/gi,'').replace(/\?/g,'').trim();
                const r = evaluateMath(expr);
                if (r !== null) return `📊 <strong>Calcul :</strong><br><div class="result-block">${expr} = <strong>${r}</strong></div>`;
            }
            if (/rédige|rédiger|écris|écrire/i.test(m)) {
                if (/email/i.test(m)) return `✍️ <strong>Email :</strong><br>Objet: ...<br>Bonjour,...<br>Cordialement,`;
                return `✍️ Email, Histoire... Lequel ?`;
            }
            if (knowledgeBase[m]) return knowledgeBase[m];
            const words = m.split(/\s+/);
            let best = null, bestScore = 0;
            for (let [k,v] of Object.entries(knowledgeBase)) {
                let score = 0;
                for (let w of words) if (k.includes(w) || w.includes(k)) score++;
                if (score > bestScore) { bestScore = score; best = v; }
            }
            if (bestScore > 0.5) return best;
            const auto = msg.match(/(.+?) (?:est|signifie|veut dire) (.+)/i);
            if (auto) {
                knowledgeBase[auto[1].trim().toLowerCase()] = auto[2].trim();
                saveKnowledge();
                return `🧠 Appris : "${auto[1].trim()}"`;
            }
            return null;
        }

        // ============ API ============
        async function getAPIResponse(message) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, model: selectedModel })
                });
                const data = await res.json();
                return data.content || 'Pas de réponse.';
            } catch(e) {
                return `🔌 Erreur API: ${e.message}`;
            }
        }

        // ============ ENVOI ============
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            addMessage('user', text);
            chatInput.value = '';
            showTyping();

            let response, source = 'local';
            if (useAPI) {
                response = await getAPIResponse(text);
                source = selectedModel;
            } else {
                response = getLocalResponse(text);
                if (!response) response = "🤔 Activez l'API ou apprenez-moi !";
            }

            setTimeout(() => {
                removeTyping();
                addMessage('assistant', response, source);
            }, 300);
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function toggleAPIMode() {
            useAPI = !useAPI;
            const btn = document.getElementById('apiToggleBtn');
            const display = document.getElementById('modeDisplay');
            if (useAPI) {
                btn.textContent = '🔌 API: ON';
                btn.classList.add('active');
                display.textContent = `Mode API (${selectedModel})`;
                addMessage('assistant', `🔌 API activée avec <strong>${selectedModel}</strong> !`, selectedModel);
            } else {
                btn.textContent = '🔌 API: OFF';
                btn.classList.remove('active');
                display.textContent = 'Mode Local';
                addMessage('assistant', '🏠 Mode Local.', 'local');
            }
        }

        function changeModel() {
            selectedModel = document.getElementById('modelSelect').value;
            if (useAPI) {
                document.getElementById('modeDisplay').textContent = `Mode API (${selectedModel})`;
                addMessage('assistant', `🔄 Modèle changé : <strong>${selectedModel}</strong>`, selectedModel);
            }
        }

        function openTrainModal() {
            document.getElementById('trainModal').classList.add('active');
            document.getElementById('trainQuestion').focus();
        }
        function closeTrainModal() {
            document.getElementById('trainModal').classList.remove('active');
        }
        function trainAI() {
            const q = document.getElementById('trainQuestion').value.trim().toLowerCase();
            const a = document.getElementById('trainAnswer').value.trim();
            if (!q || !a) return alert('Remplissez tout');
            knowledgeBase[q] = a;
            saveKnowledge();
            addMessage('assistant', `🧠 Appris : "${q}"`, 'local');
            document.getElementById('trainQuestion').value = '';
            document.getElementById('trainAnswer').value = '';
            closeTrainModal();
        }

        // ============ INIT ============
        setTimeout(() => {
            addMessage('assistant', `
                👋 <strong>ALVACOA</strong> multi-modèles !<br><br>
                🧠 <strong>Gemini</strong> (gratuit)<br>
                🐋 <strong>DeepSeek</strong> (gratuit)<br>
                🧬 <strong>Claude</strong> (payant)<br><br>
                Choisissez un modèle et activez l'API ! 🔌
            `, 'local');
        }, 500);
        chatInput.focus();
    </script>
</body>
</html>
